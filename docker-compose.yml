version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: glitch-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-glitch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-glitch_secret}
      POSTGRES_DB: ${DB_NAME:-glitch_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-glitch} -d ${DB_NAME:-glitch_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: glitch-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
